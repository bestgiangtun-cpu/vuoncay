<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HT Garden Pro - Cloud Control</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
<style>
  body { font-family: Arial, sans-serif; text-align: center; margin-top: 30px; background-color: #f4f4f9; color: #333; }
  .container { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
  h2 { color: #0076a3; margin-bottom: 5px; }
  .status { font-size: 13px; color: #888; margin-bottom: 20px; font-weight: bold; }
  .data-item { font-size: 20px; margin: 15px 0; text-align: left; padding-left: 50px; }
  .control-row { display: flex; justify-content: space-between; align-items: center; margin: 25px 50px; font-size: 20px; font-weight: bold; }
  
  /* Cấu hình Switch nút gạt */
  .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
  .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
  input:checked + .slider { background-color: #2196F3; }
  input:checked + .slider:before { transform: translateX(26px); }
  
  /* Làm mờ nút điều khiển bơm bằng tay khi đang ở chế độ AUTO */
  .disabled { opacity: 0.5; pointer-events: none; }
</style>
</head>
<body>
<div class="container">
  <h2>HT GARDEN PRO</h2>
  <div id="connection-status" class="status">Đang kết nối Cloud Broker...</div>
  <hr>
  <div class="data-item">🌡️ Nhiệt độ: <b id="lblTemp">-- °C</b></div>
  <div class="data-item">💧 Độ ẩm khí: <b id="lblHum">-- %</b></div>
  <div class="data-item">🌱 Độ ẩm đất: <b id="lblSoil">-- %</b></div>
  <hr>
  
  <div class="control-row">
    <span>Chế độ AUTO</span>
    <label class="switch">
      <input type="checkbox" id="autoSwitch" onchange="toggleAuto()">
      <span class="slider"></span>
    </label>
  </div>

  <div class="control-row" id="pumpRow">
    <span>Máy Bơm</span>
    <label class="switch">
      <input type="checkbox" id="pumpSwitch" onchange="togglePump()">
      <span class="slider"></span>
    </label>
  </div>
</div>

<script>
// ====================== CẤU HÌNH KẾT NỐI HIVEMQ CLOUD ======================
const broker = "THAY_BANG_CLUSTER_URL_CUA_BAN"; 
const port = 8884; // Bắt buộc là cổng 8884 đối với kết nối WebSockets mã hóa (WSS) của HiveMQ Cloud

const mqtt_user = "THAY_BANG_USERNAME_CUA_BAN";
const mqtt_pass = "THAY_BANG_PASSWORD_CUA_BAN";

// Tạo ngẫu nhiên một ID tránh trùng lặp phiên kết nối trên trình duyệt
const clientId = "Web_User_" + Math.random().toString(16).substr(2, 8);

const topic_sub_data = "giangtun/garden/data";
const topic_pub_pump = "giangtun/garden/pump/cmd";
const topic_pub_auto = "giangtun/garden/auto/cmd";

// Khởi tạo đối tượng kết nối MQTT Client
let mqttClient = new Paho.MQTT.Client(broker, port, clientId);

mqttClient.onConnectionLost = onConnectionLost;
mqttClient.onMessageArrived = onMessageArrived;

// Thiết lập kết nối sử dụng chứng chỉ bảo mật SSL (useSSL: true)
mqttClient.connect({ 
  onSuccess: onConnect,
  onFailure: onFail,
  useSSL: true,
  userName: mqtt_user,
  password: mqtt_pass
});

function onConnect() {
  document.getElementById("connection-status").innerText = "Đã kết nối bảo mật thành công!";
  document.getElementById("connection-status").style.color = "green";
  mqttClient.subscribe(topic_sub_data); // Đăng ký nhận luồng dữ liệu từ mạch vườn
}

function onFail(context) {
  document.getElementById("connection-status").innerText = "Kết nối thất bại: " + context.errorMessage;
  document.getElementById("connection-status").style.color = "red";
}

function onConnectionLost(responseObject) {
  if (responseObject.errorCode !== 0) {
    document.getElementById("connection-status").innerText = "Mất kết nối: " + responseObject.errorMessage;
    document.getElementById("connection-status").style.color = "red";
  }
}

// Hàm nhận chuỗi JSON từ mạch ESP32 gửi lên để phân tích ra giao diện Web
function onMessageArrived(message) {
  if (message.destinationName === topic_sub_data) {
    try {
      let data = JSON.parse(message.payloadString);
      
      document.getElementById("lblTemp").innerText = data.temp + " °C";
      document.getElementById("lblHum").innerText = data.hum + " %";
      document.getElementById("lblSoil").innerText = data.soil + " %";
      
      // Đồng bộ trực tiếp trạng thái nút gạt từ thực tế phần cứng trả về
      document.getElementById("autoSwitch").checked = (data.auto === 1);
      document.getElementById("pumpSwitch").checked = (data.pump === 1);
      
      // Kiểm tra trạng thái AUTO để khóa/mở nút gạt điều khiển bơm thủ công
      if (data.auto === 1) {
        document.getElementById("pumpRow").classList.add("disabled");
      } else {
        document.getElementById("pumpRow").classList.remove("disabled");
      }
    } catch (e) {
      console.log("Lỗi xử lý JSON:", e);
    }
  }
}

// Hàm gửi các lệnh bật/tắt chế độ từ Web xuống mạch qua Cloud Broker
function toggleAuto() {
  let isChecked = document.getElementById("autoSwitch").checked;
  let msg = isChecked ? "ON" : "OFF";
  let message = new Paho.MQTT.Message(msg);
  message.destinationName = topic_pub_auto;
  mqttClient.send(message);
}

function togglePump() {
  let isChecked = document.getElementById("pumpSwitch").checked;
  let msg = isChecked ? "ON" : "OFF";
  let message = new Paho.MQTT.Message(msg);
  message.destinationName = topic_pub_pump;
  mqttClient.send(message);
}
</script>
</body>
</html>
