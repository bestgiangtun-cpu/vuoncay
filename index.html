<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HT Garden Pro - Pump Status Tracking</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/date-fns@2.29.3/dist/date-fns.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f9; color: #333; }
  
  .header-box { text-align: center; margin-bottom: 20px; }
  h2 { color: #0076a3; margin: 0 0 5px 0; }
  .status { font-size: 13px; color: #888; font-weight: bold; }

  /* LAYOUT MẶC ĐỊNH (CHO PC) */
  .dashboard-layout { 
    display: flex; 
    flex-direction: row; 
    justify-content: space-between; 
    align-items: stretch; 
    gap: 20px; 
    max-width: 1400px; 
    margin: 0 auto; 
  }

  .left-panel { 
    flex: 1.1; 
    background: white; 
    padding: 20px; 
    border-radius: 10px; 
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-width: 380px;
  }

  .right-panel { 
    flex: 1.8; 
    background: white; 
    padding: 20px; 
    border-radius: 10px; 
    box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
    display: block; 
  }

  /* KHUNG CHỨA BIỂU ĐỒ */
  .chart-container {
    position: relative;
    width: 100%;
    height: 420px; 
  }

  /* CẤU TRÚC GAUGE */
  .gauge-container { display: flex; justify-content: space-around; margin: 10px 0 20px 0; gap: 10px; }
  
  .gauge-box { 
    width: 33%; 
    position: relative; 
    min-width: 90px; 
    text-align: center; 
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  
  .canvas-wrapper {
    position: relative;
    width: 100%;
  }
  
  .gauge-value { 
    position: absolute; 
    bottom: 18%; 
    left: 50%; 
    transform: translateX(-50%); 
    font-size: 18px; 
    font-weight: bold; 
    color: #222222; 
  }
  .gauge-label { font-size: 13px; font-weight: bold; color: #555; margin-top: 8px; }

  /* KHE ĐIỀU KHIỂN */
  .control-box { 
    border-top: 1px solid #eee; 
    padding-top: 15px; 
    padding-bottom: 10px;
  }
  
  .control-row { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    margin: 12px auto; 
    font-size: 16px; 
    font-weight: bold; 
    max-width: 260px; 
    width: 100%; 
  }
  
  .switch { position: relative; display: inline-block; width: 55px; height: 30px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 30px; }
  .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
  input:checked + .slider { background-color: #2196F3; }
  input:checked + .slider:before { transform: translateX(25px); }
  
  .disabled { opacity: 0.4; pointer-events: none; transition: opacity 0.3s; }

  /* CẤU TRÚC KHUNG CẤU HÌNH NGƯỠNG */
  .config-box {
    border-top: 1px solid #eee;
    padding-top: 15px;
    margin-top: 5px;
  }
  .config-title {
    font-size: 15px;
    font-weight: bold;
    color: #0076a3;
    margin: 0 0 12px 0;
    text-align: center;
  }
  .config-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 5px;
  }
  .config-group {
    display: flex;
    flex-direction: column;
    transition: opacity 0.3s;
  }
  .config-group label {
    font-size: 12px;
    font-weight: bold;
    color: #555;
    margin-bottom: 4px;
  }
  .config-group input {
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
    font-weight: bold;
    text-align: center;
    color: #222;
    background-color: #fafafa;
  }
  .config-group input:focus {
    border-color: #2196F3;
    background-color: #fff;
    outline: none;
  }
  .config-group input:disabled {
    background-color: #eee;
    color: #999;
    cursor: not-allowed;
  }

  /* ĐA CHỈNH SỬA CHO ĐIỆN THOẠI */
  @media (max-width: 768px) {
    body { padding: 10px; }
    .dashboard-layout { 
      flex-direction: column; 
    }
    .left-panel { 
      min-width: 100%; 
      box-sizing: border-box;
      margin-bottom: 15px;
    }
    .right-panel { 
      width: 100%; 
      box-sizing: border-box;
    }
    .chart-container {
      height: 340px; 
    }
    .gauge-value {
      font-size: 15px; 
    }
  }
</style>
</head>
<body>

<div class="header-box">
  <h2>CHĂM SÓC CÂY</h2>
  <div id="connection-status" class="status">Đang kết nối...</div>
</div>

<div class="dashboard-layout">
  
  <div class="left-panel">
    <div class="gauge-container">
      <div class="gauge-box">
        <div class="canvas-wrapper">
          <canvas id="tempGauge"></canvas>
          <div id="valTemp" class="gauge-value">--°C</div>
        </div>
        <div class="gauge-label">🌡️ Nhiệt độ</div>
      </div>
      <div class="gauge-box">
        <div class="canvas-wrapper">
          <canvas id="humGauge"></canvas>
          <div id="valHum" class="gauge-value">--%</div>
        </div>
        <div class="gauge-label">💧 Độ ẩm khí</div>
      </div>
      <div class="gauge-box">
        <div class="canvas-wrapper">
          <canvas id="soilGauge"></canvas>
          <div id="valSoil" class="gauge-value">--%</div>
        </div>
        <div class="gauge-label">🌱 Độ ẩm đất</div>
      </div>
    </div>
    
    <div class="control-box">
      <div class="control-row">
        <span>Chế độ AUTO</span>
        <label class="switch">
          <input type="checkbox" id="autoSwitch" onchange="toggleAuto()">
          <span class="slider"></span>
        </label>
      </div>

      <div class="control-row" id="pumpRow">
        <span>Máy Bơm</span>
        <label class="switch">
          <input type="checkbox" id="pumpSwitch" onchange="togglePump()">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="config-box">
      <div class="config-title">⚙️ Cấu Hình Ngưỡng AUTO</div>
      
      <div class="control-row" style="max-width: 100%; margin-bottom: 15px; border-bottom: 1px dashed #eee; padding-bottom: 10px;">
        <span style="font-size: 14px; color: #444;">Sử dụng Nhiệt độ</span>
        <label class="switch">
          <input type="checkbox" id="tempEnSwitch" checked onchange="onTempSwitchChange()">
          <span class="slider"></span>
        </label>
      </div>

      <div class="config-grid">
        <div class="config-group">
          <label>Độ ẩm đất BẬT (%)</label>
          <input type="number" id="soilOnInput" min="0" max="100" value="30" onchange="sendThresholdConfig()">
        </div>
        <div class="config-group">
          <label>Độ ẩm đất TẮT (%)</label>
          <input type="number" id="soilOffInput" min="0" max="100" value="60" onchange="sendThresholdConfig()">
        </div>
        <div class="config-group" id="tempOnGroup">
          <label>Nhiệt độ BẬT (°C)</label>
          <input type="number" id="tempOnInput" step="0.1" value="38" onchange="sendThresholdConfig()">
        </div>
        <div class="config-group" id="tempOffGroup">
          <label>Nhiệt độ TẮT (°C)</label>
          <input type="number" id="tempOffInput" step="0.1" value="30" onchange="sendThresholdConfig()">
        </div>
      </div>
    </div>
  </div>
  
  <div class="right-panel">
    <div class="chart-container">
      <canvas id="historyChart"></canvas>
    </div>
  </div>

</div>

<script>
// ====================== CẤU HÌNH KẾT NỐI HIVEMQ CLOUD ======================
const broker = "ccd26dae4aa34f3091276c54fca3ce7f.s1.eu.hivemq.cloud"; 
const port = 8884; 
const mqtt_user = "giangtun";
const mqtt_pass = "12345Abc";

const clientId = "Web_User_" + Math.random().toString(16).substr(2, 8);
const topic_sub_data = "giangtun/garden/data";
const topic_pub_pump = "giangtun/garden/pump/cmd";
const topic_pub_auto = "giangtun/garden/auto/cmd";
const topic_pub_config = "giangtun/garden/config/cmd"; 

let historyData = [];
const FIVE_HOURS_MS = 5 * 60 * 60 * 1000; 

function getTimelineBounds() {
  let maxTime = new Date();
  maxTime.setSeconds(0);
  maxTime.setMilliseconds(0);
  
  let minTime = new Date(maxTime.getTime() - FIVE_HOURS_MS);
  return { min: minTime, max: maxTime };
}

let bounds = getTimelineBounds();

let mqttClient = new Paho.MQTT.Client(broker, port, clientId);
mqttClient.onConnectionLost = onConnectionLost;
mqttClient.onMessageArrived = onMessageArrived;

mqttClient.connect({ 
  onSuccess: onConnect,
  onFailure: onFail,
  useSSL: true,
  userName: mqtt_user,
  password: mqtt_pass
});

function onConnect() {
  document.getElementById("connection-status").innerText = "Đã kết nối bảo mật thành công!";
  document.getElementById("connection-status").style.color = "green";
  mqttClient.subscribe(topic_sub_data);
}

function onFail(context) {
  document.getElementById("connection-status").innerText = "Kết nối thất bại: " + context.errorMessage;
  document.getElementById("connection-status").style.color = "red";
}

function onConnectionLost(responseObject) {
  if (responseObject.errorCode !== 0) {
    document.getElementById("connection-status").innerText = "Mất kết nối: " + responseObject.errorMessage;
    document.getElementById("connection-status").style.color = "red";
  }
}

// ====================== CẤU HÌNH KHỞI TẠO CHART.JS ======================
function createGaugeConfig(color, maxVal) {
  return {
    type: 'doughnut',
    data: {
      datasets: [{
        data: [0, maxVal],
        backgroundColor: [color, '#e0e0e0'],
        borderWidth: 0,
        circumference: 180,
        rotation: 270,
        cutout: '80%'
      }]
    },
    options: {
      plugins: { tooltip: { enabled: false }, legend: { display: false } },
      responsive: true,
      maintainAspectRatio: true,
      layout: { padding: { bottom: -40 } }
    }
  };
}

let tempGauge = new Chart(document.getElementById('tempGauge'), createGaugeConfig('#ff4d4d', 50)); 
let humGauge = new Chart(document.getElementById('humGauge'), createGaugeConfig('#2196F3', 100)); 
let soilGauge = new Chart(document.getElementById('soilGauge'), createGaugeConfig('#4CAF50', 100)); 

let lastRenderedTime = 0;

let historyChart = new Chart(document.getElementById('historyChart'), {
  type: 'line',
  data: {
    datasets: [
      {
        label: 'Nhiệt độ (°C)',
        data: [], 
        borderColor: '#ff4d4d', 
        backgroundColor: 'rgba(255, 77, 77, 0.05)',
        borderWidth: 2,
        yAxisID: 'y-temp',
        tension: 0.3,
        pointRadius: 1
      },
      {
        label: 'Độ ẩm khí (%)',
        data: [],
        borderColor: '#2196F3',
        backgroundColor: 'rgba(33, 150, 243, 0.05)',
        borderWidth: 2,
        yAxisID: 'y-soil', 
        tension: 0.3,
        pointRadius: 1
      },
      {
        label: 'Độ ẩm đất (%)',
        data: [],
        borderColor: '#4CAF50',
        backgroundColor: 'rgba(76, 175, 80, 0.05)',
        borderWidth: 2,
        yAxisID: 'y-soil', 
        tension: 0.3,
        pointRadius: 1
      },
      {
        label: 'Bơm (Bật/Tắt)',
        data: [],
        borderColor: 'rgba(33, 150, 243, 0.3)', 
        backgroundColor: 'rgba(33, 150, 243, 0.15)', 
        borderWidth: 1,
        fill: 'origin',       
        stepped: true,        
        yAxisID: 'y-pump',    
        pointRadius: 0        
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: false, 
    scales: {
      'x': {
        type: 'time', 
        bounds: 'ticks', 
        time: {
          unit: 'minute',
          displayFormats: { minute: 'HH:mm' }
        },
        title: { display: true, text: 'Biểu đồ giám sát' },
        min: bounds.min,
        max: bounds.max,
        ticks: {
          autoSkip: true,       
          maxTicksLimit: 7,     
          includeBounds: true,  
          
          callback: function(val, index, ticks) {
            let date = new Date(val);
            let currentTimeMs = date.getTime();

            if (index === 0) {
              lastRenderedTime = currentTimeMs;
              let hours = String(date.getHours()).padStart(2, '0');
              let mins = String(date.getMinutes()).padStart(2, '0');
              return hours + ":" + mins;
            }

            let diffInMinutes = (currentTimeMs - lastRenderedTime) / (1000 * 60);

            if (diffInMinutes >= 15 || index === ticks.length - 1) {
              lastRenderedTime = currentTimeMs;
              let hours = String(date.getHours()).padStart(2, '0');
              let mins = String(date.getMinutes()).padStart(2, '0');
              return hours + ":" + mins;
            }
            return null; 
          }
        }
      },
      'y-temp': { type: 'linear', position: 'left', title: { display: true, text: 'Nhiệt độ (°C)' }, min: 0, max: 50 },
      'y-soil': { type: 'linear', position: 'right', title: { display: true, text: 'Độ ẩm (%)' }, min: 0, max: 100, grid: { drawOnChartArea: false } },
      'y-pump': { type: 'linear', display: false, min: 0, max: 100 }
    },
    plugins: { 
      legend: { position: 'top', labels: { boxWidth: 12, font: { size: 11 } } },
      title: { display: true, text: 'Lịch sử hệ thống', font: { size: 13 } }
    }
  }
});

// ====================== VÒNG LẶP DỊCH KHUNG REAL-TIME ======================
setInterval(function() {
  let currentBounds = getTimelineBounds();
  historyChart.options.scales.x.max = currentBounds.max;
  historyChart.options.scales.x.min = currentBounds.min;
  historyChart.update('none'); 
}, 1000);

// --- Hàm xử lý ẩn/hiện khóa ô nhập nhiệt độ khi gạt switch ---
function toggleTempInputs() {
  let isEnabled = document.getElementById("tempEnSwitch").checked;
  document.getElementById("tempOnInput").disabled = !isEnabled;
  document.getElementById("tempOffInput").disabled = !isEnabled;
  
  if (isEnabled) {
    document.getElementById("tempOnGroup").classList.remove("disabled");
    document.getElementById("tempOffGroup").classList.remove("disabled");
  } else {
    document.getElementById("tempOnGroup").classList.add("disabled");
    document.getElementById("tempOffGroup").classList.add("disabled");
  }
}

// Xử lý sự kiện khi gạt switch nhiệt độ độc lập
function onTempSwitchChange() {
  toggleTempInputs();
  sendThresholdConfig();
}

// ====================== XỬ LÝ KHI DỮ LIỆU TỚI ======================
function onMessageArrived(message) {
  if (message.destinationName === topic_sub_data) {
    try {
      let data = JSON.parse(message.payloadString);
      let now = new Date();

      // 1. Cập nhật các đồng hồ vòng cung
      document.getElementById("valTemp").innerText = data.temp + "°C";
      document.getElementById("valHum").innerText = data.hum + "%";
      document.getElementById("valSoil").innerText = data.soil + "%";
      
      tempGauge.data.datasets[0].data = [data.temp, Math.max(0, 50 - data.temp)];
      tempGauge.update();
      humGauge.data.datasets[0].data = [data.hum, 100 - data.hum];
      humGauge.update();
      soilGauge.data.datasets[0].data = [data.soil, 100 - data.soil];
      soilGauge.update();

      let pumpValue = (data.pump === 1) ? 100 : 0;

      // 2. Thêm dữ liệu mới vào mảng tọa độ cuốn chiếu
      historyData.push({
        timestamp: now.getTime(),
        tempPoint: { x: now, y: data.temp },
        humPoint: { x: now, y: data.hum },
        soilPoint: { x: now, y: data.soil },
        pumpPoint: { x: now, y: pumpValue }
      });

      let cutOffTime = now.getTime() - FIVE_HOURS_MS;
      historyData = historyData.filter(item => item.timestamp >= cutOffTime);

      historyChart.data.datasets[0].data = historyData.map(item => item.tempPoint);
      historyChart.data.datasets[1].data = historyData.map(item => item.humPoint);
      historyChart.data.datasets[2].data = historyData.map(item => item.soilPoint);
      historyChart.data.datasets[3].data = historyData.map(item => item.pumpPoint);
      
      historyChart.update('none');
      
      // 3. Điều khiển nút gạt
      document.getElementById("autoSwitch").checked = (data.auto === 1);
      document.getElementById("pumpSwitch").checked = (data.pump === 1);
      
      if (data.auto === 1) {
        document.getElementById("pumpRow").classList.add("disabled");
      } else {
        document.getElementById("pumpRow").classList.remove("disabled");
      }

      // ========== TỰ ĐỘNG ĐỒNG BỘ CÁC NGƯỠNG TỪ MẠCH LÊN Ô NHẬP WEB ==========
      if (data.soilOn !== undefined && document.activeElement !== document.getElementById("soilOnInput")) {
        document.getElementById("soilOnInput").value = data.soilOn;
      }
      if (data.soilOff !== undefined && document.activeElement !== document.getElementById("soilOffInput")) {
        document.getElementById("soilOffInput").value = data.soilOff;
      }
      if (data.tempOn !== undefined && document.activeElement !== document.getElementById("tempOnInput")) {
        document.getElementById("tempOnInput").value = data.tempOn;
      }
      if (data.tempOff !== undefined && document.activeElement !== document.getElementById("tempOffInput")) {
        document.getElementById("tempOffInput").value = data.tempOff;
      }
      
      // Đồng bộ trạng thái nút kiểm soát nhiệt độ từ ESP32 đưa lên
      if (data.tempEn !== undefined && document.activeElement !== document.getElementById("tempEnSwitch")) {
        document.getElementById("tempEnSwitch").checked = data.tempEn;
        toggleTempInputs(); 
      }

    } catch (e) {
      console.log("Lỗi xử lý dữ liệu:", e);
    }
  }
}

function toggleAuto() {
  let isChecked = document.getElementById("autoSwitch").checked;
  let msg = isChecked ? "ON" : "OFF";
  let message = new Paho.MQTT.Message(msg);
  message.destinationName = topic_pub_auto;
  mqttClient.send(message);

  // THAY ĐỔI TẠI ĐÂY: Tự động gửi cấu hình ngưỡng hiện tại lên mạch ngay khi bật chế độ AUTO
  if (isChecked) {
    sendThresholdConfig();
  }
}

function togglePump() {
  let isChecked = document.getElementById("pumpSwitch").checked;
  let msg = isChecked ? "ON" : "OFF";
  let message = new Paho.MQTT.Message(msg);
  message.destinationName = topic_pub_pump;
  mqttClient.send(message);
}

// ========== ĐÃ SỬA: TỰ ĐỘNG BẮN DỮ LIỆU KHÔNG HIỆN POPUP ALERT GÂY PHIỀN ==========
function sendThresholdConfig() {
  let sOn = parseInt(document.getElementById("soilOnInput").value);
  let sOff = parseInt(document.getElementById("soilOffInput").value);
  let tOn = parseFloat(document.getElementById("tempOnInput").value);
  let tOff = parseFloat(document.getElementById("tempOffInput").value);
  let tEn = document.getElementById("tempEnSwitch").checked; 

  // Đóng gói payload JSON gửi xuống ESP32
  let configPayload = {
    soilOn: sOn,
    soilOff: sOff,
    tempOn: tOn,
    tempOff: tOff,
    tempEn: tEn 
  };

  let jsonString = JSON.stringify(configPayload);
  let message = new Paho.MQTT.Message(jsonString);
  message.destinationName = topic_pub_config;
  
  try {
    mqttClient.send(message);
    console.log("Đã tự động cập nhật cấu hình ngưỡng xuống MQTT:", configPayload);
  } catch (error) {
    console.error("Lỗi gửi MQTT tự động:", error);
  }
}
</script>
</body>
</html>
