<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HT Garden Pro - Pump Status Tracking</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/date-fns@2.29.3/dist/date-fns.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f9; color: #333; }
  
  .header-box { text-align: center; margin-bottom: 20px; }
  h2 { color: #0076a3; margin: 0 0 5px 0; }
  .status { font-size: 13px; color: #888; font-weight: bold; }

  /* LAYOUT NGANG CỐ ĐỊNH */
  .dashboard-layout { 
    display: flex; 
    flex-direction: row; 
    justify-content: space-between; 
    align-items: stretch; 
    gap: 20px; 
    max-width: 1400px; 
    margin: 0 auto; 
  }

  .left-panel { 
    flex: 1.1; 
    background: white; 
    padding: 20px; 
    border-radius: 10px; 
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-width: 380px;
  }

  .right-panel { 
    flex: 1.8; 
    background: white; 
    padding: 20px; 
    border-radius: 10px; 
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* CẤU TRÚC GAUGE ĐƯỢC FIX ĐỂ CHỮ NẰM GIỮA TÂM VÒNG TRÒN */
  .gauge-container { display: flex; justify-content: space-around; margin: 10px 0 20px 0; gap: 10px; }
  
  .gauge-box { 
    width: 33%; 
    position: relative; 
    min-width: 100px; 
    text-align: center; 
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  
  .canvas-wrapper {
    position: relative;
    width: 100%;
  }
  
  .gauge-value { 
    position: absolute; 
    bottom: 18%; 
    left: 50%; 
    transform: translateX(-50%); 
    font-size: 20px; 
    font-weight: bold; 
    color: #222222; 
  }
  .gauge-label { font-size: 14px; font-weight: bold; color: #555; margin-top: 8px; }

  /* KHE ĐIỀU KHIỂN - CĂN GIỮA TOÀN BỘ KHU VỰC VÀ THẲNG HÀNG */
  .control-box { 
    border-top: 1px solid #eee; 
    padding-top: 20px; 
    padding-bottom: 10px;
  }
  
  .control-row { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    margin: 12px auto; 
    font-size: 16px; 
    font-weight: bold; 
    max-width: 260px; 
    width: 100%; 
  }
  
  .switch { position: relative; display: inline-block; width: 55px; height: 30px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 30px; }
  .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
  input:checked + .slider { background-color: #2196F3; }
  input:checked + .slider:before { transform: translateX(25px); }
  
  .disabled { opacity: 0.5; pointer-events: none; }
</style>
</head>
<body>

<div class="header-box">
  <h2>CHĂM SÓC CÂY</h2>
  <div id="connection-status" class="status">Đang kết nối...</div>
</div>

<div class="dashboard-layout">
  
  <div class="left-panel">
    <div class="gauge-container">
      <div class="gauge-box">
        <div class="canvas-wrapper">
          <canvas id="tempGauge"></canvas>
          <div id="valTemp" class="gauge-value">--°C</div>
        </div>
        <div class="gauge-label">🌡️ Nhiệt độ</div>
      </div>
      <div class="gauge-box">
        <div class="canvas-wrapper">
          <canvas id="humGauge"></canvas>
          <div id="valHum" class="gauge-value">--%</div>
        </div>
        <div class="gauge-label">💧 Độ ẩm khí</div>
      </div>
      <div class="gauge-box">
        <div class="canvas-wrapper">
          <canvas id="soilGauge"></canvas>
          <div id="valSoil" class="gauge-value">--%</div>
        </div>
        <div class="gauge-label">🌱 Độ ẩm đất</div>
      </div>
    </div>
    
    <div class="control-box">
      <div class="control-row">
        <span>Chế độ AUTO</span>
        <label class="switch">
          <input type="checkbox" id="autoSwitch" onchange="toggleAuto()">
          <span class="slider"></span>
        </label>
      </div>

      <div class="control-row" id="pumpRow">
        <span>Máy Bơm</span>
        <label class="switch">
          <input type="checkbox" id="pumpSwitch" onchange="togglePump()">
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </div>
  
  <div class="right-panel">
    <canvas id="historyChart" style="width: 100%; height: 100%; min-height: 320px;"></canvas>
  </div>

</div>

<script>
// ====================== CẤU HÌNH KẾT NỐI HIVEMQ CLOUD ======================
const broker = "ccd26dae4aa34f3091276c54fca3ce7f.s1.eu.hivemq.cloud"; 
const port = 8884; 
const mqtt_user = "giangtun";
const mqtt_pass = "12345Abc";

const clientId = "Web_User_" + Math.random().toString(16).substr(2, 8);
const topic_sub_data = "giangtun/garden/data";
const topic_pub_pump = "giangtun/garden/pump/cmd";
const topic_pub_auto = "giangtun/garden/auto/cmd";

let historyData = [];
const FIVE_HOURS_MS = 5 * 60 * 60 * 1000; 

function getTimelineBounds() {
  let maxTime = new Date();
  maxTime.setSeconds(0);
  maxTime.setMilliseconds(0);
  
  let minTime = new Date(maxTime.getTime() - FIVE_HOURS_MS);
  return { min: minTime, max: maxTime };
}

let bounds = getTimelineBounds();

let mqttClient = new Paho.MQTT.Client(broker, port, clientId);
mqttClient.onConnectionLost = onConnectionLost;
mqttClient.onMessageArrived = onMessageArrived;

mqttClient.connect({ 
  onSuccess: onConnect,
  onFailure: onFail,
  useSSL: true,
  userName: mqtt_user,
  password: mqtt_pass
});

function onConnect() {
  document.getElementById("connection-status").innerText = "Đã kết nối bảo mật thành công!";
  document.getElementById("connection-status").style.color = "green";
  mqttClient.subscribe(topic_sub_data);
}

function onFail(context) {
  document.getElementById("connection-status").innerText = "Kết nối thất bại: " + context.errorMessage;
  document.getElementById("connection-status").style.color = "red";
}

function onConnectionLost(responseObject) {
  if (responseObject.errorCode !== 0) {
    document.getElementById("connection-status").innerText = "Mất kết nối: " + responseObject.errorMessage;
    document.getElementById("connection-status").style.color = "red";
  }
}

// ====================== CẤU HÌNH KHỞI TẠO CHART.JS ======================
function createGaugeConfig(color, maxVal) {
  return {
    type: 'doughnut',
    data: {
      datasets: [{
        data: [0, maxVal],
        backgroundColor: [color, '#e0e0e0'],
        borderWidth: 0,
        circumference: 180,
        rotation: 270,
        cutout: '80%'
      }]
    },
    options: {
      plugins: { tooltip: { enabled: false }, legend: { display: false } },
      responsive: true,
      maintainAspectRatio: true,
      layout: {
        padding: {
          bottom: -40
        }
      }
    }
  };
}

let tempGauge = new Chart(document.getElementById('tempGauge'), createGaugeConfig('#ff4d4d', 50)); 
let humGauge = new Chart(document.getElementById('humGauge'), createGaugeConfig('#2196F3', 100)); 
let soilGauge = new Chart(document.getElementById('soilGauge'), createGaugeConfig('#4CAF50', 100)); 

let lastRenderedTime = 0;

let historyChart = new Chart(document.getElementById('historyChart'), {
  type: 'line',
  data: {
    datasets: [
      {
        label: 'Nhiệt độ (°C)',
        data: [], 
        borderColor: '#ff4d4d', 
        backgroundColor: 'rgba(255, 77, 77, 0.05)',
        borderWidth: 2,
        yAxisID: 'y-temp',
        tension: 0.3,
        pointRadius: 1 // Đã thu nhỏ các chấm lại gọn gàng
      },
      {
        label: 'Độ ẩm không khí (%)',
        data: [],
        borderColor: '#2196F3', // Đổi sang Xanh nước biển
        backgroundColor: 'rgba(33, 150, 243, 0.05)',
        borderWidth: 2,
        yAxisID: 'y-soil', 
        tension: 0.3,
        pointRadius: 1 // Đã thu nhỏ các chấm lại gọn gàng
      },
      {
        label: 'Độ ẩm đất (%)',
        data: [],
        borderColor: '#4CAF50', // Đổi sang Xanh lá cây
        backgroundColor: 'rgba(76, 175, 80, 0.05)',
        borderWidth: 2,
        yAxisID: 'y-soil', 
        tension: 0.3,
        pointRadius: 1 // Đã thu nhỏ các chấm lại gọn gàng
      },
      {
        label: 'Trạng thái bơm (Bật/Tắt)',
        data: [],
        borderColor: 'rgba(33, 150, 243, 0.3)', 
        backgroundColor: 'rgba(33, 150, 243, 0.15)', 
        borderWidth: 1,
        fill: 'origin',       
        stepped: true,        
        yAxisID: 'y-pump',    
        pointRadius: 0        
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: false, 
    scales: {
      'x': {
        type: 'time', 
        bounds: 'ticks', 
        time: {
          unit: 'minute',
          displayFormats: { minute: 'HH:mm' }
        },
        title: { display: true, text: 'Biểu đồ giám sát' },
        min: bounds.min,
        max: bounds.max,
        ticks: {
          autoSkip: true,       
          maxTicksLimit: 11,    
          includeBounds: true,  
          
          callback: function(val, index, ticks) {
            let date = new Date(val);
            let currentTimeMs = date.getTime();

            if (index === 0) {
              lastRenderedTime = currentTimeMs;
              let hours = String(date.getHours()).padStart(2, '0');
              let mins = String(date.getMinutes()).padStart(2, '0');
              return hours + ":" + mins;
            }

            let diffInMinutes = (currentTimeMs - lastRenderedTime) / (1000 * 60);

            if (diffInMinutes >= 15 || index === ticks.length - 1) {
              lastRenderedTime = currentTimeMs;
              let hours = String(date.getHours()).padStart(2, '0');
              let mins = String(date.getMinutes()).padStart(2, '0');
              return hours + ":" + mins;
            }
            return null; 
          }
        }
      },
      'y-temp': { type: 'linear', position: 'left', title: { display: true, text: 'Nhiệt độ (°C)' }, min: 0, max: 50 },
      'y-soil': { type: 'linear', position: 'right', title: { display: true, text: 'Độ ẩm (%)' }, min: 0, max: 100, grid: { drawOnChartArea: false } },
      'y-pump': { type: 'linear', display: false, min: 0, max: 100 }
    },
    plugins: { 
      legend: { position: 'top' },
      title: { display: true, text: 'Lịch sử hệ thống', font: { size: 14 } }
    }
  }
});

// ====================== VÒNG LẶP DỊCH KHUNG REAL-TIME ======================
setInterval(function() {
  let currentBounds = getTimelineBounds();
  historyChart.options.scales.x.max = currentBounds.max;
  historyChart.options.scales.x.min = currentBounds.min;
  historyChart.update('none'); 
}, 1000);

// ====================== XỬ LÝ KHI DỮ LIỆU TỚI ======================
function onMessageArrived(message) {
  if (message.destinationName === topic_sub_data) {
    try {
      let data = JSON.parse(message.payloadString);
      let now = new Date();

      // 1. Cập nhật các đồng hồ vòng cung
      document.getElementById("valTemp").innerText = data.temp + "°C";
      document.getElementById("valHum").innerText = data.hum + "%";
      document.getElementById("valSoil").innerText = data.soil + "%";
      
      tempGauge.data.datasets[0].data = [data.temp, Math.max(0, 50 - data.temp)];
      tempGauge.update();
      humGauge.data.datasets[0].data = [data.hum, 100 - data.hum];
      humGauge.update();
      soilGauge.data.datasets[0].data = [data.soil, 100 - data.soil];
      soilGauge.update();

      let pumpValue = (data.pump === 1) ? 100 : 0;

      // 2. Thêm dữ liệu mới vào mảng tọa độ cuốn chiếu
      historyData.push({
        timestamp: now.getTime(),
        tempPoint: { x: now, y: data.temp },
        humPoint: { x: now, y: data.hum },
        soilPoint: { x: now, y: data.soil },
        pumpPoint: { x: now, y: pumpValue }
      });

      let cutOffTime = now.getTime() - FIVE_HOURS_MS;
      historyData = historyData.filter(item => item.timestamp >= cutOffTime);

      historyChart.data.datasets[0].data = historyData.map(item => item.tempPoint);
      historyChart.data.datasets[1].data = historyData.map(item => item.humPoint);
      historyChart.data.datasets[2].data = historyData.map(item => item.soilPoint);
      historyChart.data.datasets[3].data = historyData.map(item => item.pumpPoint);
      
      historyChart.update('none');
      
      // 3. Điều khiển nút gạt
      document.getElementById("autoSwitch").checked = (data.auto === 1);
      document.getElementById("pumpSwitch").checked = (data.pump === 1);
      
      if (data.auto === 1) {
        document.getElementById("pumpRow").classList.add("disabled");
      } else {
        document.getElementById("pumpRow").classList.remove("disabled");
      }
    } catch (e) {
      console.log("Lỗi xử lý dữ liệu:", e);
    }
  }
}

function toggleAuto() {
  let isChecked = document.getElementById("autoSwitch").checked;
  let msg = isChecked ? "ON" : "OFF";
  let message = new Paho.MQTT.Message(msg);
  message.destinationName = topic_pub_auto;
  mqttClient.send(message);
}

function togglePump() {
  let isChecked = document.getElementById("pumpSwitch").checked;
  let msg = isChecked ? "ON" : "OFF";
  let message = new Paho.MQTT.Message(msg);
  message.destinationName = topic_pub_pump;
  mqttClient.send(message);
}
</script>
</body>
</html>
